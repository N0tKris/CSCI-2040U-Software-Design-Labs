<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PlateRate</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            color: #111;
        }

        .page {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 15px 30px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 20px;
        }

        .title h1 {
            margin: 0;
            font-size: 32px;
        }

        .title p {
            margin: 6px 0 0;
            font-size: 14px;
            color: #555;
        }

        .auth {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: flex-end;
        }

        .card {
            background: white;
            border: 1px solid #ccc;
            padding: 16px;
            margin-bottom: 16px;
        }

        .auth input,
        .form-grid input,
        .modal input,
        .modal textarea {
            height: 38px;
            padding: 8px 10px;
            border: 1px solid #bbb;
            font-size: 14px;
            background: white;
            outline: none;
        }

        .modal textarea {
            min-height: 100px;
            height: auto;
            resize: vertical;
            font-family: Arial, sans-serif;
        }

        .user-chip {
            min-height: 38px;
            display: inline-flex;
            align-items: center;
            padding: 8px 10px;
            border: 1px solid #bbb;
            background: #f8f8f8;
            font-size: 14px;
            color: #444;
        }

        button {
            height: 38px;
            padding: 0 14px;
            border: 1px solid #555;
            background: white;
            font-size: 14px;
            cursor: pointer;
        }

        button:hover {
            background: #f0f0f0;
        }

        .btn-primary {
            background: #e9ecef;
        }

        .btn-danger {
            background: #f5e6e6;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .section-header h2 {
            margin: 0;
            font-size: 20px;
        }

        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .status {
            margin-top: 8px;
            font-size: 14px;
            color: #666;
            min-height: 18px;
        }

        .restaurant-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .restaurant-item {
            display: grid;
            grid-template-columns: 30px 1fr;
            gap: 16px;
            align-items: flex-start;
            border: 1px solid #ccc;
            padding: 18px 20px;
            background: #fff;
            position: relative;
        }

        .restaurant-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            margin-top: 4px;
        }

        .restaurant-main {
            position: relative;
            padding-right: 90px;
        }

        .meta {
            display: flex;
            gap: 32px;
            font-size: 14px;
            color: #555;
            margin-top: 6px;
            margin-bottom: 10px;
            align-items: center;
        }

        .description {
            font-size: 14px;
            color: #333;
            line-height: 1.4;
            white-space: pre-wrap;
        }

        .empty {
            padding: 18px;
            text-align: center;
            color: #666;
            border: 1px dashed #bbb;
            background: #fafafa;
        }

        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.25);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-backdrop.show {
            display: flex;
        }

        .modal {
            width: 100%;
            max-width: 600px;
            background: white;
            border: 1px solid #bbb;
            padding: 20px;
        }

        .modal h3 {
            margin: 0 0 8px;
            font-size: 22px;
        }

        .modal p {
            margin: 0 0 14px;
            color: #555;
            font-size: 14px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field.full {
            grid-column: 1 / -1;
        }

        .field label {
            font-size: 13px;
            font-weight: bold;
        }

        .modal-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .edit-btn {
            position: absolute;
            top: 0;
            right: 0;
            height: 32px;
            padding: 0 12px;
            border: 1px solid #555;
            background: white;
            font-size: 13px;
            cursor: pointer;
        }

        .edit-btn:hover {
            background: #f0f0f0;
        }

        .filter-section {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-start;
            margin-bottom: 4px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 180px;
        }

        .filter-group label {
            font-size: 13px;
            font-weight: bold;
        }

        .filter-section select {
            height: 38px;
            padding: 8px 10px;
            border: 1px solid #bbb;
            font-size: 14px;
            background: white;
            outline: none;
            cursor: pointer;
        }

        .dietary-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            min-height: 38px;
        }

        .dietary-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            cursor: pointer;
            padding: 4px 10px;
            border: 1px solid #bbb;
            background: white;
            user-select: none;
        }

        .dietary-tag:has(input:checked) {
            background: #e9ecef;
            border-color: #555;
        }

        .dietary-tag input[type="checkbox"] {
            width: 14px;
            height: 14px;
            cursor: pointer;
        }

        .filter-count {
            font-size: 13px;
            color: #555;
            min-height: 16px;
        }

        .filter-actions {
            justify-content: flex-end;
            align-self: flex-end;
        }

        @media (max-width: 800px) {
            .topbar {
                flex-direction: column;
            }

            .auth {
                justify-content: flex-start;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .filter-group {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="page">
    <div class="topbar">
        <div class="title">
            <h1>PlateRate</h1>
            <p>Simple restaurant review system · Backend: <code>{{ backend_url }}</code></p>
        </div>

        <div class="auth">
            <input id="login-username" placeholder="Username" />
            <input id="login-password" type="password" placeholder="Password" />
            <button id="login">Log in</button>
            <button id="logout" style="display:none;">Log out</button>
            <div id="who" class="user-chip">current user</div>
        </div>
    </div>

    <div class="card">
        <div class="section-header">
            <h2>Restaurants</h2>
            <div class="actions">
                <button id="refresh">Load restaurants</button>
                <button id="open-modal" class="btn-primary">Add restaurant</button>
                <button id="delete-selected" class="btn-danger">Delete selected</button>
            </div>
        </div>

        <div class="status" id="status">Ready — you can load restaurants.</div>
    </div>

    <div class="card">
        <div class="filter-section">
            <div class="filter-group">
                <label for="cuisine-filter">Cuisine</label>
                <select id="cuisine-filter">
                    <option value="">All Cuisines</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Dietary</label>
                <div id="dietary-checkboxes" class="dietary-tags">
                    <span style="font-size:13px;color:#999;">Load restaurants to see options</span>
                </div>
            </div>
            <div class="filter-group filter-actions">
                <button id="clear-filters">Clear Filters</button>
            </div>
        </div>
        <div id="filter-count" class="filter-count"></div>
    </div>

    <div class="card">
        <div id="restaurant-list" class="restaurant-list">
            <div class="empty">No restaurants loaded yet.</div>
        </div>
    </div>
</div>

<div class="modal-backdrop" id="modal-backdrop">
    <div class="modal">
        <h3>Add Restaurant</h3>
        <p>Enter the restaurant details below.</p>

        <div class="form-grid">
            <div class="field">
                <label for="name">Name</label>
                <input id="name" />
            </div>

            <div class="field">
                <label for="cuisine">Cuisine</label>
                <input id="cuisine" />
            </div>

            <div class="field">
                <label for="dietaryTags">Dietary Tags</label>
                <input id="dietaryTags" placeholder="comma-separated (e.g. vegan,gluten-free)" />
            </div>

            <div class="field">
                <label for="location">Location</label>
                <input id="location" />
            </div>

            <div class="field full">
                <label for="description">Description</label>
                <textarea id="description"></textarea>
            </div>
        </div>

        <div class="modal-actions">
            <button id="create">Save restaurant</button>
            <button id="close-modal">Cancel</button>
        </div>
    </div>
</div>

<script>
    const statusEl = document.getElementById("status");
    const listEl = document.getElementById("restaurant-list");
    const modalBackdrop = document.getElementById("modal-backdrop");
    let editingRestaurantId = null;
    let allRestaurants = [];

    function setStatus(msg) {
        statusEl.textContent = msg;
    }

    function openModal() {
        modalBackdrop.classList.add("show");
    }

    function closeModal() {
        modalBackdrop.classList.remove("show");
    }

    function clearForm() {
        editingRestaurantId = null;
        document.getElementById('name').value = '';
        document.getElementById('cuisine').value = '';
        document.getElementById('dietaryTags').value = '';
        document.getElementById('location').value = '';
        document.getElementById('description').value = '';
        document.getElementById('create').textContent = 'Save restaurant';
    }

    function filterRestaurants(restaurants, cuisineFilter, dietaryFilters) {
        const cuisineLower = cuisineFilter ? cuisineFilter.toLowerCase() : '';
        return restaurants.filter(r => {
            if (cuisineLower && (!r.cuisine || r.cuisine.toLowerCase() !== cuisineLower)) {
                return false;
            }
            if (dietaryFilters.length > 0) {
                const tags = (r.dietaryTags || r.dietary_tags || '').toLowerCase()
                    .split(',').map(t => t.trim()).filter(Boolean);
                if (!dietaryFilters.every(df => tags.includes(df.toLowerCase()))) {
                    return false;
                }
            }
            return true;
        });
    }

    function applyFilters() {
        const cuisineFilter = document.getElementById('cuisine-filter').value;
        const dietaryFilters = [...document.querySelectorAll('#dietary-checkboxes input:checked')].map(el => el.value);
        const filtersActive = cuisineFilter !== '' || dietaryFilters.length > 0;
        const filtered = filterRestaurants(allRestaurants, cuisineFilter, dietaryFilters);
        renderRestaurants(filtered, filtersActive);
        const countEl = document.getElementById('filter-count');
        countEl.textContent = filtersActive
            ? `${filtered.length} restaurant${filtered.length !== 1 ? 's' : ''} found`
            : '';
    }

    function populateCuisineDropdown(restaurants) {
        const select = document.getElementById('cuisine-filter');
        const currentVal = select.value;
        const cuisines = [...new Set(
            restaurants.map(r => r.cuisine).filter(Boolean).map(c => c.trim())
        )].sort();
        select.innerHTML = '<option value="">All Cuisines</option>';
        for (const c of cuisines) {
            const opt = document.createElement('option');
            opt.value = c;
            opt.textContent = c;
            if (c === currentVal) opt.selected = true;
            select.appendChild(opt);
        }
    }

    function populateDietaryCheckboxes(restaurants) {
        const container = document.getElementById('dietary-checkboxes');
        const currentChecked = [...container.querySelectorAll('input:checked')].map(el => el.value);
        const tags = [...new Set(
            restaurants.flatMap(r =>
                (r.dietaryTags || r.dietary_tags || '').split(',').map(t => t.trim().toLowerCase())
            ).filter(Boolean)
        )].sort();
        container.innerHTML = '';
        if (tags.length === 0) {
            container.innerHTML = '<span style="font-size:13px;color:#999;">No dietary tags available</span>';
            return;
        }
        for (const tag of tags) {
            const lbl = document.createElement('label');
            lbl.className = 'dietary-tag';
            const inp = document.createElement('input');
            inp.type = 'checkbox';
            inp.value = tag;
            if (currentChecked.includes(tag)) inp.checked = true;
            inp.addEventListener('change', applyFilters);
            lbl.appendChild(inp);
            const displayName = tag.length > 0
                ? tag.charAt(0).toUpperCase() + tag.slice(1)
                : tag;
            lbl.appendChild(document.createTextNode('\u00a0' + displayName));
            container.appendChild(lbl);
        }
    }

    function renderRestaurants(restaurants, filtersActive) {
        listEl.innerHTML = '';

        if (!restaurants || restaurants.length === 0) {
            listEl.innerHTML = `<div class="empty">${filtersActive ? 'No restaurants match your filters.' : 'No restaurants found.'}</div>`;
            return;
        }

        for (const r of restaurants) {
            const item = document.createElement('div');
            item.className = 'restaurant-item';
            item.dataset.id = r.id ?? '';

            item.innerHTML = `
              <div>
                <input type="checkbox" class="restaurant-check" />
              </div>
              <div class="restaurant-main">
                <h3 style="margin:0 0 10px 0;">${r.name ?? ''}</h3>
                <button class="edit-btn" data-id="${r.id ?? ''}">Edit</button>

                <div class="meta">
                                    <span><strong>Cuisine:</strong> ${r.cuisine ?? ''}</span>
                                    <span><strong>Location:</strong> ${r.location ?? ''}</span>
                                    <span><strong>Dietary:</strong> ${r.dietaryTags ?? r.dietary_tags ?? '—'}</span>
                                    <span><strong>Rating:</strong> ${'★'.repeat(r.stars || 0) + '☆'.repeat(5 - (r.stars || 0))}</span>
                </div>

                <div class="description">${r.description ?? ''}</div>
              </div>
            `;

            listEl.appendChild(item);

            const editBtn = item.querySelector('.edit-btn');
            editBtn.addEventListener('click', () => openEditModal(r));
        }
    }

    async function refreshRestaurants() {
        setStatus("Loading restaurants...");
        try {
            const res = await fetch('/api/restaurants');
            const data = await res.json();

            if (!data.ok) {
                setStatus(`Couldn't load restaurants: ${data.message || 'server error'}`);
                return;
            }

            allRestaurants = data.data;
            populateCuisineDropdown(allRestaurants);
            populateDietaryCheckboxes(allRestaurants);
            applyFilters();
            setStatus(`Loaded ${allRestaurants.length} restaurant(s).`);
        } catch (err) {
            setStatus(`Network error: ${err}`);
        }
    }

    function openEditModal(restaurant) {
        editingRestaurantId = restaurant.id;

        document.getElementById('name').value = restaurant.name ?? '';
        document.getElementById('cuisine').value = restaurant.cuisine ?? '';
        document.getElementById('dietaryTags').value = restaurant.dietaryTags ?? restaurant.dietary_tags ?? '';
        document.getElementById('location').value = restaurant.location ?? '';
        document.getElementById('description').value = restaurant.description ?? '';

        document.getElementById('create').textContent = 'Update restaurant';
        openModal();
    }

    async function addRestaurant() {
        const payload = {
            name: document.getElementById('name').value.trim(),
            cuisine: document.getElementById('cuisine').value.trim(),
            location: document.getElementById('location').value.trim(),
            description: document.getElementById('description').value.trim(),
            dietaryTags: document.getElementById('dietaryTags').value.trim()
        };

        if (!payload.name || !payload.cuisine || !payload.location) {
            setStatus('Please provide name, cuisine, and location.');
            return;
        }

        const token = localStorage.getItem('token');
        const headers = { 'Content-Type': 'application/json' };
        if (token) headers['Authorization'] = token;

        try {
            if (editingRestaurantId !== null) {
                setStatus('Updating restaurant...');

                const res = await fetch(`${'{{ backend_url }}'}/api/restaurants/${editingRestaurantId}`, {
                    method: 'PUT',
                    headers,
                    body: JSON.stringify(payload)
                });

                const data = await res.json();

                if (!res.ok || !data.ok) {
                    setStatus(`Couldn't update restaurant (server responded ${res.status}).`);
                    return;
                }

                setStatus('Restaurant updated.');
            } else {
                setStatus('Adding restaurant...');

                const res = await fetch('/api/restaurants', {
                    method: 'POST',
                    headers,
                    body: JSON.stringify(payload)
                });

                const data = await res.json();

                if (!res.ok || !data.ok) {
                    setStatus(`Couldn't add restaurant (server responded ${res.status}).`);
                    return;
                }

                setStatus('Restaurant added.');
            }

            clearForm();
            closeModal();
            await refreshRestaurants();
        } catch (err) {
            setStatus(`Request failed: ${err}`);
        }
    }


    async function deleteSelectedRestaurants() {
        const checked = [...document.querySelectorAll('.restaurant-check:checked')];
        if (checked.length === 0) {
            setStatus('Select at least one restaurant to delete.');
            return;
        }

        const token = localStorage.getItem('token');
        const headers = {};
        if (token) headers['Authorization'] = token;

        setStatus('Deleting selected restaurants...');

        try {
            for (const checkbox of checked) {
                const item = checkbox.closest('.restaurant-item');
                const id = item?.dataset.id;
                if (!id) continue;

                const res = await fetch(`${'{{ backend_url }}'}/api/restaurants/${id}`, {
                    method: 'DELETE',
                    headers
                });

                if (!res.ok) {
                    throw new Error(`Failed to delete restaurant ${id}`);
                }
            }

            setStatus('Selected restaurant(s) deleted.');
            await refreshRestaurants();
        } catch (err) {
            setStatus(`Delete error: ${err}`);
        }
    }

    document.getElementById('refresh').addEventListener('click', refreshRestaurants);
    document.getElementById('create').addEventListener('click', addRestaurant);
    document.getElementById('open-modal').addEventListener('click', () => {
        clearForm();
        openModal();
    });
    document.getElementById('close-modal').addEventListener('click', closeModal);
    document.getElementById('delete-selected').addEventListener('click', deleteSelectedRestaurants);
    document.getElementById('cuisine-filter').addEventListener('change', applyFilters);
    document.getElementById('clear-filters').addEventListener('click', () => {
        document.getElementById('cuisine-filter').value = '';
        document.querySelectorAll('#dietary-checkboxes input').forEach(el => { el.checked = false; });
        applyFilters();
    });

    const loginBtn = document.getElementById('login');
    const logoutBtn = document.getElementById('logout');
    const whoEl = document.getElementById('who');

    function setAuthToken(token) {
        if (token) {
            localStorage.setItem('token', token);
        } else {
            localStorage.removeItem('token');
        }
        updateAuthUI();
    }

    async function updateAuthUI() {
        const token = localStorage.getItem('token');
        if (!token) {
            whoEl.textContent = 'current user';
            logoutBtn.style.display = 'none';
            loginBtn.style.display = 'inline-block';
            return;
        }

        try {
            const res = await fetch('/api/auth/me', { headers: { 'Authorization': token } });
            if (!res.ok) {
                setAuthToken(null);
                return;
            }

            const data = await res.json();
            whoEl.textContent = `${data.username} (${data.role})`;
            logoutBtn.style.display = 'inline-block';
            loginBtn.style.display = 'none';
        } catch (e) {
            setAuthToken(null);
        }
    }

    loginBtn.addEventListener('click', async () => {
        const username = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value.trim();

        if (!username || !password) {
            setStatus('Please enter username and password.');
            return;
        }

        setStatus('Signing in...');
        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();

            if (!res.ok) {
                const errMsg = data?.error || data?.message || 'Login failed.';
                setStatus(errMsg);
                return;
            }

            setAuthToken(data.token);
        } catch (err) {
            setStatus(`Login error: ${err}`);
        }
    });

    logoutBtn.addEventListener('click', async () => {
        const token = localStorage.getItem('token');
        if (token) {
            await fetch('/api/auth/logout', {
                method: 'POST',
                headers: { 'Authorization': token }
            }).catch(() => {});
        }

        setAuthToken(null);
        setStatus('Signed out.');
    });

    modalBackdrop.addEventListener('click', (e) => {
        if (e.target === modalBackdrop) {
            closeModal();
        }
    });

    localStorage.removeItem('token');
    setStatus('Please sign in to perform admin actions.');
    updateAuthUI();
    refreshRestaurants();
</script>
</body>
</html>
