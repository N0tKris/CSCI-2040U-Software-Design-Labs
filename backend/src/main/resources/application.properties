spring.application.name=backend

# Load .env file from the workspace root (one level above backend/)
# so YELP_API_KEY and other variables are available without manually
# exporting environment variables before starting the JVM.
spring.config.import=optional:file:../.env[.properties]

# ============================================================
# PostgreSQL Data Source
# Override these values via environment variables or
# application-local.properties for your local setup.
# ============================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/restaurant_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Use "validate" in production; "update" is convenient during development
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Log Hibernate schema generation (DDL) statements
logging.level.org.hibernate.tool.hbm2ddl=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Note: this application expects a running Postgres instance for the demo.
# Override DB connection settings via env vars: DB_URL, DB_USERNAME, DB_PASSWORD.

# ============================================================
# Yelp Fusion API
# Set YELP_API_KEY as an environment variable.
# ============================================================
yelp.api.key=${YELP_API_KEY:}
yelp.api.base-url=https://api.yelp.com/v3
